<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BugHawk</title>
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='bughawk_logo.jpg') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* (Your CSS styles are unchanged) */
        body {
            font-family: 'Inter', sans-serif;
            color: #CCD6F6;
            background: linear-gradient(-45deg, #0A192F, #112240, #1C2E4A, #0A192F);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-effect {
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(42, 67, 101, 0.3);
            transition: all 0.3s ease;
        }

        .glass-effect:hover {
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.3);
            transform: translateY(-3px);
        }

        .form-input {
            background-color: #112240;
            border: 1px solid #304C6B;
            color: #CCD6F6;
        }

        .btn-primary {
            background-color: #64FFDA;
            color: #0A192F;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #0A192F;
            color: #64FFDA;
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.4);
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.2;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    
    <canvas id="particle-canvas"></canvas>

    <div class="w-full max-w-md relative z-10">
        
        <div class="w-full max-w-md z-50">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="flash-message p-4 rounded-md shadow-lg mb-4 text-center font-medium
                              {{ 'bg-[#64FFDA] text-[#0A192F]' if category == 'success' else 
                                 'bg-red-600 text-white' if category == 'danger' else 
                                 'bg-blue-600 text-white' }}"> {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>

        <div class="text-center mb-8">
            <a href="/">
                <img src="{{ url_for('static', filename='bughawk_logo.jpg') }}" alt="BugHawk Logo"
                    class="h-12 mx-auto rounded-full">
            </a>
            <h1 class="text-3xl font-bold text-white mt-4">Welcome Back</h1>
            <p class="text-gray-400">Sign in to continue to BugHawk.</p>
        </div>
        <div class="glass-effect rounded-lg p-8 shadow-2xl">
            <form action="{{ url_for('login') }}" method="POST">
                <a href="{{ url_for('login_github') }}"
                    class="w-full flex items-center justify-center bg-[#112240] border border-[#304C6B] text-white font-semibold py-3 px-4 rounded-md hover:bg-[#1d3b63] transition-colors">
                    <svg class="w-6 h-6 mr-3" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.91 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                    </svg>
                    Sign in with GitHub
                </a>
                <div class="my-6 flex items-center">
                    <hr class="w-full border-t border-[#304C6B]"><span class="px-4 text-gray-400 text-sm">OR</span>
                    <hr class="w-full border-t border-[#304C6B]">
                </div>
                <div class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-300">Email Address</label>
                        <input type="email" id="email" name="email"
                            class="form-input w-full mt-1 rounded-md shadow-sm focus:ring-[#64FFDA] focus:border-[#64FFDA]" required>
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
                        <input type="password" id="password" name="password"
                            class="form-input w-full mt-1 rounded-md shadow-sm focus:ring-[#64FFDA] focus:border-[#64FFDA]" required>
                    </div>
                </div>
                <div class="mt-8"><button type="submit" class="w-full btn-primary font-bold py-3 px-4 rounded-md">Sign
                        In</button></div>
            </form>
            <p class="text-center text-sm text-gray-400 mt-6">
                Don't have an account? <a href="/signup" class="font-medium text-[#64FFDA] hover:underline">Sign up</a>
            </p>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            const flashMessages = document.querySelectorAll('.flash-message');
            flashMessages.forEach(function(message) {
                setTimeout(function() {
                    message.style.transition = 'opacity 0.5s ease';
                    message.style.opacity = '0';
                    setTimeout(function() {
                        message.style.display = 'none';
                    }, 500); // Wait for fade out
                }, 2000); // 2 seconds
            });
        });
    </script>
</body>

</html>
